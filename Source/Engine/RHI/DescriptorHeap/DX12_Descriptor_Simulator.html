<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <title>DX12 动态描述符堆模拟器 (Dynamic Descriptor Heap Simulator)</title>
    <style>
        body { font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif, 'Meiryo'; background-color: #1e1e1e; color: #d4d4d4; margin: 0; padding: 20px; display: flex; flex-direction: column; align-items: center; }
        h1 { color: #569cd6; font-size: 24px; margin-bottom: 5px;}
        .subtitle { color: #808080; font-size: 14px; margin-bottom: 20px; }
        .container { display: flex; flex-direction: column; width: 100%; max-width: 900px; gap: 30px; }
        .panel { background-color: #252526; border: 1px solid #333; border-radius: 8px; padding: 20px; box-shadow: 0 4px 6px rgba(0,0,0,0.3); }
        .panel-title { font-size: 18px; color: #4ec9b0; margin-top: 0; margin-bottom: 15px; display: flex; justify-content: space-between; align-items: center; }
        
        /* 内存槽位样式 */
        .memory-row { display: flex; gap: 10px; flex-wrap: wrap; }
        .slot { width: 80px; height: 80px; background-color: #333; border: 2px dashed #555; border-radius: 6px; display: flex; flex-direction: column; justify-content: center; align-items: center; font-size: 12px; transition: all 0.3s ease; position: relative;}
        .slot.occupied { border-style: solid; border-color: #007acc; background-color: #0d293e; }
        .slot.stale { border-color: #ce9178; background-color: #4d2b22; animation: pulse 1.5s infinite; }
        .slot.gpu-data { border-style: solid; border-color: #6a9955; background-color: #1e3b22; transform: scale(0); animation: popIn 0.4s forwards; }
        
        .slot-title { font-weight: bold; margin-bottom: 5px; color: #fff;}
        .slot-desc { color: #9cdcfe; font-size: 10px; text-align: center; word-break: break-all;}
        
        /* 按钮与控制区 */
        .controls { display: flex; justify-content: center; gap: 20px; margin: 20px 0; }
        button { background-color: #0e639c; color: white; border: none; padding: 12px 24px; font-size: 16px; border-radius: 4px; cursor: pointer; transition: background-color 0.2s; font-weight: bold; }
        button:hover { background-color: #1177bb; }
        button:active { background-color: #094771; }
        button.commit-btn { background-color: #c586c0; color: #1e1e1e; }
        button.commit-btn:hover { background-color: #d197c9; }

        @keyframes pulse { 0% { box-shadow: 0 0 0 0 rgba(206, 145, 120, 0.4); } 70% { box-shadow: 0 0 0 10px rgba(206, 145, 120, 0); } 100% { box-shadow: 0 0 0 0 rgba(206, 145, 120, 0); } }
        @keyframes popIn { to { transform: scale(1); } }
        
        .stale-badge { position: absolute; top: -8px; right: -8px; background: #ce9178; color: #000; font-size: 10px; font-weight: bold; padding: 2px 6px; border-radius: 10px; display: none; }
        .slot.stale .stale-badge { display: block; }
    </style>
</head>
<body>

    <h1>DX12 描述符拷贝模拟器</h1>
    <div class="subtitle">Dynamic Descriptor Heap Stage & Commit Visualization</div>

    <div class="controls">
        <button onclick="stageDescriptor()">Stage 描述符 (ステージング)</button>
        <button class="commit-btn" onclick="commitTables()">执行 CopyAndBindStaleTables (コミット)</button>
    </div>

    <div class="container">
        <div class="panel">
            <div class="panel-title">
                <span>CPU 句柄缓存 (CPU Handle Cache) - 带有空洞且离散</span>
            </div>
            <div class="memory-row" id="cpu-cache">
                </div>
        </div>

        <div class="panel">
            <div class="panel-title">
                <span>GPU 着色器可见堆 (GPU Shader-Visible Heap) - 绝对连续</span>
            </div>
            <div class="memory-row" id="gpu-heap">
                </div>
        </div>
    </div>

    <script>
        const cpuSize = 8;
        const cpuCacheElement = document.getElementById('cpu-cache');
        const gpuHeapElement = document.getElementById('gpu-heap');
        
        // 模拟 CPU 状态
        let cpuSlots = Array(cpuSize).fill(null);
        let resourceCounter = 1;
        let gpuOffset = 0x8000; // 模拟显存地址

        // 初始化 UI
        function init() {
            for (let i = 0; i < cpuSize; i++) {
                const slot = document.createElement('div');
                slot.className = 'slot';
                slot.id = `cpu-slot-${i}`;
                slot.innerHTML = `
                    <div class="stale-badge">Stale</div>
                    <div class="slot-title">空槽位</div>
                    <div class="slot-desc">Root[${Math.floor(i/4)}] Offset[${i%4}]</div>
                `;
                cpuCacheElement.appendChild(slot);
            }
        }

        // 模拟 StageDescriptorHandles
        function stageDescriptor() {
            // 找一个随机的空位置模拟离散碎片
            let emptyIndices = [];
            cpuSlots.forEach((val, idx) => { if (!val) emptyIndices.push(idx); });
            
            if (emptyIndices.length === 0) {
                alert("CPU 缓存已满！请先 Commit。");
                return;
            }

            const randomIdx = emptyIndices[Math.floor(Math.random() * emptyIndices.length)];
            const resName = `Texture_${resourceCounter++}`;
            
            cpuSlots[randomIdx] = { name: resName, stale: true };
            
            // 更新 UI
            const slotEl = document.getElementById(`cpu-slot-${randomIdx}`);
            slotEl.className = 'slot occupied stale';
            slotEl.querySelector('.slot-title').innerText = resName;
            slotEl.querySelector('.slot-desc').innerText += '\n(CPU Ptr)';
        }

        // 模拟 CopyAndBindStaleTables
        function commitTables() {
            let hasStale = false;
            
            // 模拟 _BitScanForward 过滤空洞的过程
            cpuSlots.forEach((slotData, index) => {
                if (slotData && slotData.stale) {
                    hasStale = true;
                    // 1. 在 GPU 堆中创建新块 (连续分配)
                    const gpuSlot = document.createElement('div');
                    gpuSlot.className = 'slot gpu-data';
                    gpuSlot.innerHTML = `
                        <div class="slot-title">${slotData.name}</div>
                        <div class="slot-desc">GPU Addr:<br/>0x${gpuOffset.toString(16).toUpperCase()}</div>
                    `;
                    gpuHeapElement.appendChild(gpuSlot);
                    
                    gpuOffset += 32; // 模拟描述符大小偏移

                    // 2. 清除 CPU 的 Stale 标记 (模拟缓存刷新)
                    slotData.stale = false;
                    const cpuSlotEl = document.getElementById(`cpu-slot-${index}`);
                    cpuSlotEl.className = 'slot occupied';
                }
            });

            if (!hasStale) {
                alert("当前没有发生变化的 (Stale) 描述符需要提交！");
            }
        }

        init();
    </script>
</body>
</html>
